<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="-8 -8 40 40" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-link">
  <!-- Black background -->
  <rect x="-8" y="-8" width="40" height="40" fill="black"></rect>

  <!-- Top-right chain link -->
  <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>

  <!-- Bottom-left chain link -->
  <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>

  <!-- Black "cutout" gap that stays in place where the sliver normally sits -->
  <path d="M17.54 13.54l3-3"
        stroke="black"
        stroke-width="3"
        stroke-linecap="round"/>

  <!-- Purple sliver: swings out 45° and back with click flash -->
  <path d="M17.54 13.54l3-3"
        stroke="#8b5cf6"
        stroke-width="2.5"
        stroke-linecap="round">
    <animateTransform attributeName="transform"
                      type="rotate"
                      values="0 17.54 13.54;
                              45 17.54 13.54;
                              45 17.54 13.54;
                              0 17.54 13.54;
                              0 17.54 13.54"
                      keyTimes="0; 0.35; 0.5; 0.85; 1"
                      keySplines="0.4 0 0.6 1;
                                  0 0 1 1;
                                  0.4 0 0.6 1;
                                  0 0 1 1"
                      calcMode="spline"
                      dur="2.5s"
                      repeatCount="indefinite"/>
    <animate attributeName="stroke"
             values="#8b5cf6; #8b5cf6; #8b5cf6; #e9d5ff; #8b5cf6; #8b5cf6"
             keyTimes="0; 0.5; 0.84; 0.87; 0.95; 1"
             dur="2.5s"
             repeatCount="indefinite"/>
    <animate attributeName="stroke-width"
             values="2.5; 2.5; 2.5; 3.5; 2.5; 2.5"
             keyTimes="0; 0.5; 0.84; 0.87; 0.95; 1"
             dur="2.5s"
             repeatCount="indefinite"/>
  </path>

  <!-- Click effect: expanding ring 1 -->
  <circle cx="19" cy="12" r="0.5" fill="none" stroke="#c4b5fd" stroke-width="0.4" opacity="0">
    <animate attributeName="r"
             values="0.5; 0.5; 4.5; 0.5"
             keyTimes="0; 0.84; 0.95; 0.96"
             dur="2.5s"
             repeatCount="indefinite"/>
    <animate attributeName="opacity"
             values="0; 0; 0.9; 0; 0"
             keyTimes="0; 0.84; 0.86; 0.95; 1"
             dur="2.5s"
             repeatCount="indefinite"/>
    <animate attributeName="stroke-width"
             values="0.4; 0.4; 0.1; 0.4"
             keyTimes="0; 0.84; 0.95; 0.96"
             dur="2.5s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Click effect: expanding ring 2 (delayed) -->
  <circle cx="19" cy="12" r="0.5" fill="none" stroke="#a78bfa" stroke-width="0.3" opacity="0">
    <animate attributeName="r"
             values="0.5; 0.5; 6; 0.5"
             keyTimes="0; 0.86; 0.99; 1"
             dur="2.5s"
             repeatCount="indefinite"/>
    <animate attributeName="opacity"
             values="0; 0; 0.7; 0; 0"
             keyTimes="0; 0.86; 0.88; 0.99; 1"
             dur="2.5s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Click effect: comic-style spark burst -->
  <g opacity="0">
    <line x1="19" y1="12" x2="19" y2="9" stroke="#e9d5ff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="19" y1="12" x2="22" y2="12" stroke="#e9d5ff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="19" y1="12" x2="19" y2="15" stroke="#e9d5ff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="19" y1="12" x2="16" y2="12" stroke="#e9d5ff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="19" y1="12" x2="21.1" y2="9.9" stroke="#e9d5ff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="19" y1="12" x2="21.1" y2="14.1" stroke="#e9d5ff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="19" y1="12" x2="16.9" y2="14.1" stroke="#e9d5ff" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="19" y1="12" x2="16.9" y2="9.9" stroke="#e9d5ff" stroke-width="0.5" stroke-linecap="round"/>
    <animate attributeName="opacity"
             values="0; 0; 1; 0; 0"
             keyTimes="0; 0.84; 0.86; 0.92; 1"
             dur="2.5s"
             repeatCount="indefinite"/>
    <animateTransform attributeName="transform"
                      type="scale"
                      additive="sum"
                      values="0.3; 0.3; 1.3; 1.3"
                      keyTimes="0; 0.84; 0.92; 1"
                      dur="2.5s"
                      repeatCount="indefinite"/>
  </g>
</svg>
