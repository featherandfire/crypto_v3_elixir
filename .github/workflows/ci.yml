name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Elixir — compile + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_portfolio_v3_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: crypto_portfolio_v3

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v5

      - name: Install Erlang/OTP + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28.0'
          elixir-version: '1.19.0-otp-28'

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            crypto_portfolio_v3/deps
            crypto_portfolio_v3/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('crypto_portfolio_v3/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Fetch deps
        run: mix deps.get --only test

      - name: Compile
        run: mix compile

      - name: Run tests
        run: mix test

  frontend:
    name: TypeScript — typecheck + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
