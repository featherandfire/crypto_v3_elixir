name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # for AWS OIDC
  contents: read

jobs:
  backend:
    name: Elixir — compile + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brokerage_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: brokerage

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v5

      - name: Install Erlang/OTP + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28.0'
          elixir-version: '1.19.0-otp-28'

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            brokerage/deps
            brokerage/_build
          key: ${{ runner.os }}-mix-test-${{ hashFiles('brokerage/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-test-

      - name: Fetch deps
        run: mix deps.get --only test

      - name: Compile
        run: mix compile

      - name: Run tests
        run: mix test

  frontend:
    name: TypeScript — typecheck + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────
  # CD — Fly.io deploy on push to main after tests pass. PRs are
  # test-only. Disabled by default while the migration is being
  # scaffolded; flip `if:` to the commented-out condition once
  # `flyctl auth login` + `flyctl apps create` + secrets are in
  # place and the cutover is approved.
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Fly.io
    needs: [backend, frontend]
    if: false  # ← change to: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --config brokerage/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
