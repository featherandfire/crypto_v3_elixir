name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # for AWS OIDC
  contents: read

jobs:
  backend:
    name: Elixir — compile + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crypto_portfolio_v3_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: crypto_portfolio_v3

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v5

      - name: Install Erlang/OTP + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28.0'
          elixir-version: '1.19.0-otp-28'

      - name: Cache deps + _build
        uses: actions/cache@v4
        with:
          path: |
            crypto_portfolio_v3/deps
            crypto_portfolio_v3/_build
          key: ${{ runner.os }}-mix-test-${{ hashFiles('crypto_portfolio_v3/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-test-

      - name: Fetch deps
        run: mix deps.get --only test

      - name: Compile
        run: mix compile

      - name: Run tests
        run: mix test

  frontend:
    name: TypeScript — typecheck + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────
  # CD — only on push to main after tests pass. PRs build + test only.
  # Build happens on the EC2 itself to avoid glibc mismatch between
  # ubuntu runners and Amazon Linux 2023.
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: Open SSH port for this runner
        id: open-ssh
        run: |
          IP=$(curl -4 -s https://checkip.amazonaws.com)
          echo "runner_ip=$IP" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "${{ secrets.DEPLOY_SG_ID }}" \
            --protocol tcp --port 22 \
            --cidr "${IP}/32"

      - name: SSH to EC2, pull, build, deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ec2-user
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 20m
          script: |
            set -e
            cd ~/src/crypto_v3_elixir
            git fetch origin main
            git reset --hard origin/main
            chmod +x scripts/deploy-remote.sh
            SHA_SHORT=$(git rev-parse --short=8 HEAD)
            bash scripts/deploy-remote.sh "$SHA_SHORT"

      - name: Close SSH port
        if: always() && steps.open-ssh.outputs.runner_ip
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${{ secrets.DEPLOY_SG_ID }}" \
            --protocol tcp --port 22 \
            --cidr "${{ steps.open-ssh.outputs.runner_ip }}/32" || true
